<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glanza Pipe Fitting | Digital Card</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<!-- FONT AWESOME ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* RESET & GLOBAL */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#0A2540,#1E90FF);
    display:flex; justify-content:center; align-items:center;
    min-height:100vh;
}

/* CARD */
.card {
    width: 360px;
    background: #fff;
    border-radius: 25px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transition: 0.3s ease;
}
.card:hover {transform: translateY(-5px); box-shadow: 0 25px 70px rgba(0,0,0,0.3);}

/* LOGO */
.logo {
    width: 100px;
    margin-bottom: 15px;
}
.logo img {width: 100%; border-radius:50%;}

/* NAME & TAGLINE */
h2 {color:#0A2540; font-size:24px; margin-bottom:5px;}
p.tagline {color:#555; font-size:15px; margin-bottom:20px;}

/* BUTTONS */
.btn {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:13px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    margin:8px 0;
    transition:0.3s;
}
.btn i {font-size:18px;}

/* BUTTON COLORS */
.btn.call {background:#0A2540; color:#fff;}
.btn.whatsapp {background:#25D366; color:#fff;}
.btn.website {background:#1E90FF; color:#fff;}
.btn.contact {background:#f1f1f1; color:#333;}
.btn.location {background:#f1f1f1; color:#333;}

/* BUTTON HOVER */
.btn:hover {transform:scale(1.05); box-shadow:0 8px 20px rgba(0,0,0,0.25);}

/* SOCIAL ICONS */
.social {
    margin-top:20px;
}
.social a {margin:0 8px; display:inline-block; transition:0.3s;}
.social a img {width:40px; border-radius:10px;}
.social a:hover {transform:scale(1.2);}

/* RESPONSIVE */
@media(max-width:400px){
    .card{width:90%;}
    .btn{font-size:14px; padding:11px;}
    .logo{width:80px;}
}
</style>
</head>

<body>

<div class="card">

    <!-- LOGO -->
    <div class="logo">
        <img src="glanza-logo.png" alt="Glanza Pipe Fitting Logo">
    </div>

    <!-- NAME & TAGLINE -->
    <h2>Glanza Pipe Fitting</h2>
    <p class="tagline">Manufacturer of UPVC & CPVC Pipe Fittings</p>

    <!-- BUTTONS -->
    <a href="tel:+918530193038" class="btn call"><i class="fa-solid fa-phone"></i> Call Now</a>
    <a href="https://wa.me/918530193038" class="btn whatsapp" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
    <a href="https://glanzapipefitting.in/" target="_blank" class="btn website"><i class="fa-solid fa-globe"></i> Visit Website</a>
    <a href="glanza-contact.vcf" download class="btn contact"><i class="fa-solid fa-address-card"></i> Save Contact</a>
    <a href="https://maps.app.goo.gl/iTnXoRN9vGkCjRgP8" target="_blank" class="btn location"><i class="fa-solid fa-map-marker-alt"></i> Location</a>

    <!-- SOCIAL ICONS -->
    <div class="social">
        <a href="https://www.instagram.com/glanzapipefitting/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram"></a>
        <a href="https://www.facebook.com/profile.php?id=61576484231136" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"></a>
        <a href="https://www.linkedin.com/company/112832017/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn"></a>
    </div>

</div>

</body>
</html>
